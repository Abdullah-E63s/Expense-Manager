<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Account</title>
    <link rel="stylesheet" href="restore.css">
</head>
<body>
    <div class="container">
        <h1>🔐 Restore User Account</h1>
        <p>Enter the email of the account you wish to restore.</p>

        <div class="form-group">
            <input type="email" id="email" placeholder="Enter user email..." required>
            <button id="restoreBtn">Restore</button>
        </div>

        <div id="message"></div>
    </div>

    <script src="restore.js"></script>
</body>
</html>
