<!DOCTYPE html>
<html lang="en">

<head>

    <script src="/static/javascript/config.js"></script></head>

<body>
  <div class="login-container">
    <div class="login-card">
      <h1>Admin Login</h1>
      <p class="subtitle">Restricted access â€“ authorized personnel only</p>

      <form id="admin-login-form" method="POST" action="/admin/login">

          <label for="admin-username">Email</label>
          <input type="email" id="admin-username" name="username" placeholder="admin@mail.com" required />
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>

      </form>
    </div>
  </div>
</body>
