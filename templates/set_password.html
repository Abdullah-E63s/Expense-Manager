<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Set New Password • Expense Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/set-password.css">

</head>
<body>
    <div class="set-password-container">
        <h2>Set a New Password</h2>
        <p>Please enter a new password for your account.</p>
        
        <!-- Success Message -->
        <div id="success-message" class="success-message"></div>
        
        <!-- Error Message -->
        <div id="error-message" class="error-message"></div>
        
        <form id="set-password-form" class="set-password-form">
            <input type="hidden" id="reset-token" name="token" value="{{ token }}">
            <div class="password-field">
                <label for="new-password">New Password</label>
                <div class="password-input-container">
                    <input type="password" id="new-password" name="password" 
                           placeholder="Enter a strong password" required minlength="10"
                           autocomplete="new-password">
                    <button type="button" class="toggle-password" 
                            onclick="togglePasswordVisibility('new-password')" 
                            aria-label="Show password">
                        👁️
                    </button>
                </div>
                
                <!-- Password Strength Meter -->
                <div class="password-strength">
                    <div id="strength-meter">
                        <div id="strength-meter-fill" class="strength-meter-fill"></div>
                    </div>
                </div>
                
                <!-- Password Hints -->
                <div class="password-hints">
                    <div class="hint-item">
                        <span class="hint-icon">•</span>
                        <span>At least 10 characters</span>
                    </div>
                    <div class="hint-item"> 
                        <span class="hint-icon">•</span>
                        <span>At least one uppercase letter</span>
                    </div>
                    <div class="hint-item">
                        <span class="hint-icon">•</span>
                        <span>At least one lowercase letter</span>
                    </div>
                    <div class="hint-item">
                        <span class="hint-icon">•</span>
                        <span>At least one number</span>
                    </div>
                    <div class="hint-item">
                        <span class="hint-icon">•</span>
                        <span>At least one special character</span>
                    </div>
                </div>
            </div>
            
            <div class="password-field">
                <label for="confirm-password">Confirm New Password</label>
                <div class="password-input-container">
                    <input type="password" id="confirm-password" 
                           placeholder="Confirm your new password" required
                           autocomplete="new-password">
                    <button type="button" class="toggle-password" 
                            onclick="togglePasswordVisibility('confirm-password')" 
                            aria-label="Show password">
                        👁️
                    </button>
                </div>
            </div>
            
            <button type="submit" id="submit-btn" class="submit-btn">
                Update Password
            </button>
        </form>
            
        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>
    </div>
    
    <script src="/static/javascript/set-password.js"></script>
