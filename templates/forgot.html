<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Forgot Password â€¢ Expense Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/forgot.css">

    <script src="/static/javascript/config.js"></script></head>
<body>
    <div class="forgot-password-container">
        <h2>Forgot Your Password?</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        
        <!-- Success Message -->
        <div id="success-message" class="success-message"></div>
        
        <div id="error-message" class="error-message"></div>
        
        <form id="forgot-password-form" class="forgot-form">
            
            <!-- Initial Form -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required 
                       placeholder="Enter your email address">
            </div>
        
            <button type="submit" id="submit-forgot-password" class="btn primary">Send Reset Link</button>

            
            <div class="back-to-login">
                Remember your password? <a href="/login">Back to Login</a>
            </div>
        </form>
    </div>
    <script src="/static/javascript/forgot.js"></script>

</body>
</html>
